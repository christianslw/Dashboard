<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWR Standort Daten Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .coord-input:nth-child(even) { background-color: #f9fafb; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Standorte JS Editor</h1>
            <p class="text-gray-600">Daten dynamisch erweitern und verwalten</p>
        </header>

        <section id="import-section" class="bg-white p-6 rounded-xl shadow-md mb-6">
            <h2 class="text-xl font-semibold mb-4 text-blue-600">1. Daten importieren</h2>
            <textarea id="json-input" class="w-full h-40 p-4 border rounded-lg font-mono text-sm mb-4" placeholder="Inhalt der standorte.js hier einfügen..."></textarea>
            <button onclick="importData()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">Daten laden</button>
        </section>

        <div id="editor-ui" class="hidden">
            
            <section class="bg-blue-50 border border-blue-200 p-6 rounded-xl shadow-md mb-6">
                <h2 class="text-xl font-semibold mb-4 text-blue-800">Globale Aktionen (Auf alle anwenden)</h2>
                <div class="flex flex-wrap gap-4 items-end">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Feldname (z.B. zufahrt)</label>
                        <input type="text" id="new-field-name" class="mt-1 p-2 border rounded shadow-sm" placeholder="Feldname">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Standard-Typ</label>
                        <select id="new-field-type" class="mt-1 p-2 border rounded shadow-sm">
                            <option value="array">Leeres Array [ ]</option>
                            <option value="string">Leerer Text ""</option>
                            <option value="null">Nullwert (null)</option>
                        </select>
                    </div>
                    <button onclick="addGlobalField()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg transition">Feld überall hinzufügen</button>
                </div>
                <p class="mt-2 text-xs text-blue-600 italic">* Existierende Felder werden nicht überschrieben.</p>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <aside class="col-span-1 bg-white p-4 rounded-xl shadow-md max-h-[600px] overflow-y-auto">
                    <h2 class="font-bold mb-4 border-b pb-2">Standorte (<span id="count">0</span>)</h2>
                    <input type="text" onkeyup="filterList(this.value)" class="w-full p-2 mb-4 border rounded" placeholder="Suche...">
                    <ul id="location-list" class="space-y-1"></ul>
                </aside>

                <main class="col-span-1 md:col-span-2 bg-white p-6 rounded-xl shadow-md">
                    <div id="no-selection" class="text-center py-20 text-gray-400 italic">
                        Wähle einen Standort aus der Liste, um ihn zu bearbeiten.
                    </div>
                    <div id="item-editor" class="hidden">
                        <h2 class="text-2xl font-bold mb-4 text-gray-800 border-b pb-2" id="edit-title">Edit</h2>
                        
                        <div id="fields-container" class="space-y-4">
                            </div>

                        <div class="mt-8 pt-4 border-t flex justify-between">
                            <button onclick="saveCurrentItem()" class="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold shadow-lg hover:bg-blue-700">Änderungen merken</button>
                        </div>
                    </div>
                </main>
            </div>

            <section class="mt-10 bg-gray-800 text-white p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-semibold mb-4">3. Exportieren</h2>
                <button onclick="exportData()" class="bg-yellow-500 hover:bg-yellow-600 text-gray-900 px-6 py-2 rounded-lg font-bold transition mb-4">Code für standorte.js generieren</button>
                <textarea id="output-area" class="w-full h-40 p-4 bg-gray-900 border border-gray-700 rounded-lg font-mono text-xs text-green-400" readonly></textarea>
            </section>
        </div>
    </div>

    <script>
        let data = [];
        let currentIndex = -1;

        // Extrahiert das Array aus dem JS-Inhalt
        function importData() {
            const input = document.getElementById('json-input').value;
            try {
                // Wir suchen den Teil zwischen [ und ]
                const arrayMatch = input.match(/\[\s*\{[\s\S]*\}\s*\]/);
                if (arrayMatch) {
                    data = JSON.parse(arrayMatch[0]);
                    renderList();
                    document.getElementById('editor-ui').classList.remove('hidden');
                    document.getElementById('import-section').classList.add('hidden');
                } else {
                    alert("Kein gültiges Array gefunden. Achte darauf, den gesamten Inhalt der Datei inkl. [ ] zu kopieren.");
                }
            } catch (e) {
                alert("Fehler beim Parsen der Daten. Ist es korrektes JSON?");
                console.error(e);
            }
        }

        function renderList(filter = "") {
            const list = document.getElementById('location-list');
            list.innerHTML = "";
            document.getElementById('count').innerText = data.length;

            data.forEach((item, index) => {
                if (filter && !item.name.toLowerCase().includes(filter.toLowerCase()) && !item.nummer.includes(filter)) return;
                
                const li = document.createElement('li');
                li.className = `p-2 cursor-pointer rounded hover:bg-gray-100 ${index === currentIndex ? 'bg-blue-100 font-bold border-l-4 border-blue-500' : ''}`;
                li.innerHTML = `<span class="text-xs text-gray-500">${item.nummer}</span> ${item.name || '---'}`;
                li.onclick = () => editItem(index);
                list.appendChild(li);
            });
        }

        function filterList(val) {
            renderList(val);
        }

        function addGlobalField() {
            const name = document.getElementById('new-field-name').value.trim();
            const type = document.getElementById('new-field-type').value;
            
            if (!name) return alert("Feldname fehlt");

            data = data.map(item => {
                if (item[name] === undefined) {
                    if (type === 'array') item[name] = [];
                    else if (type === 'string') item[name] = "";
                    else item[name] = null;
                }
                return item;
            });
            alert(`Feld '${name}' wurde zu allen Einträgen hinzugefügt (sofern noch nicht vorhanden).`);
            if (currentIndex !== -1) editItem(currentIndex);
        }

        function editItem(index) {
            currentIndex = index;
            renderList();
            document.getElementById('no-selection').classList.add('hidden');
            const editor = document.getElementById('item-editor');
            editor.classList.remove('hidden');
            
            const item = data[index];
            document.getElementById('edit-title').innerText = `${item.nummer} - ${item.name}`;
            
            const container = document.getElementById('fields-container');
            container.innerHTML = "";

            // Alle Felder des Objekts durchlaufen
            Object.keys(item).forEach(key => {
                const fieldDiv = document.createElement('div');
                fieldDiv.className = "border-b pb-4";
                
                let html = `<label class="block text-sm font-bold text-gray-600 mb-1 uppercase tracking-wider">${key}</label>`;
                
                if (key === 'zufahrt' || Array.isArray(item[key])) {
                    // Spezial-Editor für Koordinaten-Arrays
                    html += `<div id="array-editor-${key}" class="space-y-2 mb-2">`;
                    (item[key] || []).forEach((pair, pIdx) => {
                        html += `
                            <div class="flex gap-2 coord-input p-1 items-center">
                                <span class="text-xs w-6 text-gray-400">${pIdx+1}</span>
                                <input type="number" step="any" value="${pair[0]}" onchange="updateCoord(${index}, '${key}', ${pIdx}, 0, this.value)" class="p-1 border rounded w-full" placeholder="Lon">
                                <input type="number" step="any" value="${pair[1]}" onchange="updateCoord(${index}, '${key}', ${pIdx}, 1, this.value)" class="p-1 border rounded w-full" placeholder="Lat">
                                <button onclick="removeCoord(${pIdx}, '${key}')" class="text-red-500 px-2 font-bold">×</button>
                            </div>`;
                    });
                    html += `</div>`;
                    html += `<button onclick="addCoord('${key}')" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">+ Paar hinzufügen</button>`;
                } else if (typeof item[key] === 'object' && item[key] !== null) {
                    html += `<textarea readonly class="w-full p-2 bg-gray-50 text-xs font-mono border rounded">${JSON.stringify(item[key])}</textarea>`;
                } else {
                    // Standard Input
                    html += `<input type="text" value="${item[key] === null ? '' : item[key]}" 
                             onchange="updateValue('${key}', this.value)" 
                             class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">`;
                }
                
                fieldDiv.innerHTML = html;
                container.appendChild(fieldDiv);
            });
        }

        function updateValue(key, val) {
            if (data[currentIndex][key] === null || typeof data[currentIndex][key] === 'number') {
                data[currentIndex][key] = val === "" ? null : (isNaN(val) ? val : parseFloat(val));
            } else {
                data[currentIndex][key] = val;
            }
        }

        function updateCoord(idx, key, pIdx, coordIdx, val) {
            data[idx][key][pIdx][coordIdx] = parseFloat(val);
        }

        function addCoord(key) {
            if (!data[currentIndex][key]) data[currentIndex][key] = [];
            data[currentIndex][key].push([0, 0]);
            editItem(currentIndex);
        }

        function removeCoord(pIdx, key) {
            data[currentIndex][key].splice(pIdx, 1);
            editItem(currentIndex);
        }

        function saveCurrentItem() {
            alert("Änderungen im Arbeitsspeicher übernommen.");
        }

        function exportData() {
            const code = `const standorteDaten = ${JSON.stringify(data, null, 2)};`;
            const area = document.getElementById('output-area');
            area.value = code;
            area.select();
            alert("Der neue Code wurde unten generiert und ausgewählt. Kopiere ihn einfach zurück in deine standorte.js");
        }
    </script>
</body>
</html>
